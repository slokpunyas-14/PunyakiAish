<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(135deg, #faf6f0 0%, #f0e6d8 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    padding: 48px 36px;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }

  .card h1 {
    font-size: 28px;
    color: #4a3b32;
    margin-bottom: 8px;
    font-weight: 400;
    letter-spacing: 1px;
  }

  .card p.subtitle {
    color: #9a8a7a;
    font-size: 14px;
    margin-bottom: 32px;
    letter-spacing: 0.5px;
  }

  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid #ddd0c0;
    border-radius: 8px;
    font-size: 16px;
    font-family: Arial, sans-serif;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: #b8860b;
  }

  button {
    width: 100%;
    padding: 14px;
    background: #b8860b;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-family: Arial, sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }

  button:hover {
    background: #9c7209;
  }

  button:disabled {
    background: #ccc;
    cursor: not-allowed;
  }

  .message {
    margin-top: 16px;
    font-size: 14px;
    font-family: Arial, sans-serif;
    min-height: 20px;
  }

  .message.success {
    color: #2e7d32;
  }

  .message.error {
    color: #c62828;
  }
</style>
</head>
<body>

<div class="card">
  <h1>You're Invited 💍</h1>
  <p class="subtitle">Kindly RSVP below</p>

  <form id="rsvpForm">
    <input type="text" id="nameInput" placeholder="Enter your full name" required autocomplete="off">
    <button type="submit" id="submitBtn">Confirm RSVP</button>
  </form>

  <div class="message" id="message"></div>
</div>

<script>
  const API_URL = '/api/rsvp';

  const form = document.getElementById('rsvpForm');
  const nameInput = document.getElementById('nameInput');
  const submitBtn = document.getElementById('submitBtn');
  const messageEl = document.getElementById('message');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = nameInput.value.trim();
    if (!name) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';
    messageEl.textContent = '';
    messageEl.className = 'message';

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || 'Submission failed');
      }

      messageEl.textContent = data.message || `Thank you, ${name}!`;
      messageEl.className = 'message success';
      nameInput.value = '';

    } catch (err) {
      console.error(err);
      messageEl.textContent = err.message || 'Something went wrong. Please try again.';
      messageEl.className = 'message error';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Confirm RSVP';
    }
  });
</script>

</body>
</html>
